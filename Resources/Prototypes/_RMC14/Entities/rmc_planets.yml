- type: entity
  id: RMCPlanetChances
  name: LV-522 Притензия Шанса
  components:
  - type: RMCPlanetMapPrototype
    map: /Maps/_RMC14/chances.yml
    camouflage: Classic
    announcement: "Пан-пан. Говорит командующий офицер КСШ Ханьют, КМП США FORECON. В настоящее время мы находимся на планете LV-522 в непосредственной близости от 'Притнезии Шанса'. Мы не можем связаться с 'Ханьют', и наши десантные корабли не могут взлететь в данный момент. Мы запрашиваем помощь у любых находящихся поблизости судов; эта трансляция будет повторяться каждые 24 часа."
