- type: entity
  id: RMCPlanetChances
  name: LV-522 Претензия Шанса
  components:
  - type: RMCPlanetMapPrototype
    map: /Maps/_RMC14/chances.yml
    announcement: "Пан-Пан. С вами говорит командир корабля «Ханьют», КМП США ФОРЕКОН. В настоящее время мы находимся на планете LV-522 в непосредственной близости от Претензия Шанса. Мы не можем связаться с «Ханьютом», а наши корабли не могут взлететь в данный момент. Мы просим помощи у всех близлежащих кораблей; это сообщение будет повторяться каждые 24 часа."
    camouflage: Classic
