# Despoiler caste actions. Parent: ActionXenoBase (canonical RMC14 base).
# Pattern mirrors RMC14's ActionXenoAcidStrong (xeno_offense_actions.yml) so
# the target-mode highlight and click-through behaviour match the rest of the
# xeno toolkit.
# NOTE: The Despoiler's Tail Stab now uses standard ActionXenoTailStab from
# the core RMC14 action set. Bonus acid damage is applied passively by
# StoriesDespoilerFinishingStabServerSystem.

- type: entity
  parent: ActionXenoBase
  id: RMCActionXenoDespoilerAcidBarrage
  name: rmc-action-despoiler-acid-barrage-name
  description: rmc-action-despoiler-acid-barrage-desc
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Interface/Actions/despoiler.rsi
      state: acid_barrage
    checkCanInteract: false
    useDelay: 12
  - type: TargetAction
    range: 12
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:XenoDespoilerAcidBarrageActionEvent
  - type: XenoDespoilerAcidBarrageAction
    plasmaCost: 100
    maxChargeSeconds: 3
    minProjectiles: 1
    maxProjectiles: 8
    empowerBonusProjectiles: 6
    scatterDegrees: 30
    chargingSpeedMultiplier: 0.5
    projectileId: RMCProjectileDespoilerAcidShot
    lingeringAcidChance: 0.25
    splashRadius: 1
    projectileSpeed: 12
    minRangeTiles: 1
    maxRangeTiles: 6
    minProjectileScale: 0.9
    maxProjectileScale: 1.33
    cancelCooldownSeconds: 2
    chargeSound:
      path: /Audio/_RMC14/Xeno/acid_sizzle1.ogg
    fireSound:
      path: /Audio/_RMC14/Xeno/alien_spitacid2.ogg
  - type: XenoActionPlasma
    cost: 100

- type: entity
  parent: ActionXenoBase
  id: RMCActionXenoDespoilerCausticEmbrace
  name: rmc-action-despoiler-caustic-embrace-name
  description: rmc-action-despoiler-caustic-embrace-desc
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Interface/Actions/despoiler.rsi
      state: caustic_embrace
    checkCanInteract: false
    useDelay: 12
  - type: TargetAction
    range: 5
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:XenoDespoilerCausticEmbraceActionEvent
  - type: XenoDespoilerCausticEmbraceAction
    plasmaCost: 100
    normalRange: 1
    empoweredRange: 5
    splashDamage:
      types:
        Heat: 30
    empoweredDamage:
      types:
        Heat: 30
    lingeringAcidChance: 0.3
    empoweredWeakenSeconds: 1.0
    splashAcidDurationSeconds: 12
    telegraphProto: RMCEffectDespoilerCausticTelegraph
    lingeringAcidProto: RMCEffectDespoilerLingeringAcid
    # Combo=true makes UserAcidedComponent fire the Enhanced (yellow) visual on
    # MapInit, the same path Acider Runner's combo hit takes.
    empoweredAcid:
    - type: UserAcided
      combo: true
      armorPiercing: 40
      damage:
        types:
          Heat: 2
      duration: 30
    pounceSound:
      path: /Audio/_RMC14/Xeno/alien_roar1.ogg
  - type: XenoActionPlasma
    cost: 100

- type: entity
  parent: ActionXenoBase
  id: RMCActionXenoDespoilerOozingWounds
  name: rmc-action-despoiler-oozing-wounds-name
  description: rmc-action-despoiler-oozing-wounds-desc
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Interface/Actions/despoiler.rsi
      state: oozing_wounds
    checkCanInteract: false
    useDelay: 25
  - type: InstantAction
    event: !type:XenoDespoilerOozingWoundsActionEvent
  - type: XenoDespoilerOozingWoundsAction
    plasmaCost: 100
    baseRadius: 1
    severityHpThreshold1: 0.7
    severityHpThreshold2: 0.3
    sprayLifetime: 2
    sprayDamage: 30
    lingeringAcidChance: 0.2
    empoweredStunSeconds: 1.0
    empoweredImmunitySeconds: 3.0
    distanceDelayPerTileSeconds: 0.2
    telegraphProto: RMCEffectDespoilerOozingTelegraph
    acidSprayProto: RMCEffectDespoilerAcidSpray
    acidSprayEmpoweredProto: RMCEffectDespoilerAcidSprayEmpowered
    lingeringAcidProto: RMCEffectDespoilerLingeringAcid
    castSound:
      path: /Audio/_RMC14/Xeno/acid_sizzle3.ogg
  - type: XenoActionPlasma
    cost: 100

- type: entity
  parent: ActionXenoBase
  id: RMCActionXenoDespoilerCatalyze
  name: rmc-action-despoiler-catalyze-name
  description: rmc-action-despoiler-catalyze-desc
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Interface/Actions/despoiler.rsi
      state: catalyze
    checkCanInteract: false
    useDelay: 20
  - type: InstantAction
    event: !type:XenoDespoilerCatalyzeActionEvent
  - type: XenoDespoilerCatalyzeAction
    plasmaCost: 0
    hypertensionCost: 1
    buffDurationSeconds: 10
    visualProto: RMCEffectDespoilerCatalyze
