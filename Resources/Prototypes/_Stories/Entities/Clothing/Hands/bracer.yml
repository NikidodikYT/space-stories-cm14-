- type: entity
  parent: [STHunterBaseItem, ClothingHandsBase]
  id: STBracerHunter
  name: clan bracers
  description: An extremely complex, yet simple-to-operate set of armored bracers worn by the Hunter. It has many functions, activate them to use some.
  suffix: Base
  components:
  - type: Sprite
    sprite: _Stories/Objects/Clothing/Hands/Bracer/base.rsi
  - type: Clothing
    sprite: _Stories/Objects/Clothing/Hands/Bracer/base.rsi
  - type: Access
    slot: gloves
  - type: IdCard
    nameLocId: cm-access-id-card-component-owner-name-job-title-text
    fullNameLocId: cm-access-id-card-component-owner-full-name-job-title-text
    canMicrowave: false
  - type: Tag
    tags:
    - STPredatorGear
    - DoorBumpOpener
  - type: PresetIdCard
    job: STHunter
  - type: HunterBracer
    bracerPowerAlert: STBracerPowerBase
  - type: ItemSlots
    slots:
      st-bracer-plasma-caster-slot:
        name: st-bracer-plasma-caster-slot
        insertOnInteract: false
        ejectOnInteract: false
        insertSound: /Audio/_Stories/Weapons/pred_attach.ogg
        ejectSound: /Audio/_Stories/Machines/click.ogg
        whitelist:
          tags:
          - STPlasmaCasterHolder
      st-bracer-left-attachment-slot:
        name: st-bracer-left-attachment-slot
        insertOnInteract: false
        ejectOnInteract: false
        insertSound: /Audio/_Stories/Weapons/pred_attach.ogg
        ejectSound: /Audio/_Stories/Machines/click.ogg
        whitelist:
          tags:
          - STBracerAttachment
      st-bracer-right-attachment-slot:
        name: st-bracer-right-attachment-slot
        insertOnInteract: false
        ejectOnInteract: false
        insertSound: /Audio/_Stories/Weapons/pred_attach.ogg
        ejectSound: /Audio/_Stories/Machines/click.ogg
        whitelist:
          tags:
          - STBracerAttachment

