- type: entity
  parent:
    - CMXenoDeveloped
    - CMXenoTail
    - CMXenoFlammable
    - RMCXenoSpeechSounds
    - RMCXenoCommendationReceiver
    - RMCXenoMobCollision
  id: STXenoWarriorBoxer
  name: Warrior
  description: A beefy alien with an armored carapace.
  suffix: Boxer
  components:
    - type: GhostRole
      name: cm-job-name-xeno-warrior
    - type: Sprite
      sprite: _Stories/Mobs/Xenos/Warrior/warrior_boxer.rsi
    - type: MobState
      allowedStates:
        - Alive
        - Critical
        - Dead
    - type: MobThresholds
      thresholds:
        0: Alive
        500: Critical
        600: Dead
    - type: Xeno
      role: CMXenoWarrior
      actionIds:
        - ActionXenoRest
        - ActionXenoRegurgitate
        - ActionXenoWatch
        - ActionXenoTailStab
        - ActionXenoDevolve
        - STActionXenoBoxerUppercut
        - STActionXenoBoxerPunch
        - STActionXenoBoxerJab
      tier: 2
      hudOffset: 0,0.25
      unlockAt: 540 # 9 minutes
    - type: XenoRegen
      restHealMultiplier: 1.4
    - type: XenoLight
    - type: XenoDevolve
      devolvesTo:
        - CMXenoDefender
    - type: XenoDevour
    - type: BoxerPunch
      damage:
        types:
          Blunt: 20
    - type: BoxerJab
    - type: BoxerUppercut
    - type: XenoPlasma
      plasma: 0
      maxPlasma: 0
      plasmaRegenOnWeeds: 0
    - type: XenoEvolution
      max: 500
      evolvesTo:
        - RMCXenoCrusher
        - CMXenoPraetorian
    - type: CMArmor
      xenoArmor: 25
      explosionArmor: 45
    - type: XenoClaws
      clawType: Sharp
    - type: MeleeWeapon
      damage:
        groups:
          Brute: 30
    - type: XenoTailStab
      tailDamage:
        groups:
          Brute: 45
    - type: Tackle
      min: 5
    - type: XenoStrain
      name: stories-xeno-boxer-name
      description: stories-xeno-boxer-description
      popup: stories-xeno-boxer-popup
    - type: SlowOnPull
      slowdowns:
        - multiplier: 0.4525
          whitelist:
            components:
              - Marine
        - multiplier: 0.5025
          whitelist:
            components:
              - XenoLight
        - multiplier: 0.3625
          whitelist:
            components:
              - XenoHeavy
    - type: RMCXenoDamageVisuals
      prefix: warrior
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: warrior
    - type: IntelRecoverCorpseObjectiveOnDeath
      value: 0.2
    - type: XenoBoxerKnockout
    - type: RMCSize
      size: Big
    - type: FixedIdentity
      name: cm-job-name-xeno-warrior
    - type: RMCSurgeryXenoHeart
      item: RMCOrganXenoHeartT2
    - type: XenoHidden
    - type: RMCActionOrder
      id: STXenoWarriorBoxer

