# TODO Stories: placeholder sprites (m2c), replace with M134C art
- type: entity
  parent: [ CMBaseWeaponGun, BaseItem ]
  id: STWeaponM134C
  name: M134C-JLCW minigun
  description: Juggernaut's Large Combat Weapon. A six-barreled rotary machine gun powered by the exoskeleton's battery. Spins up before firing and overheats under sustained fire.
  components:
  - type: Item
    size: Huge
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/HMGs/m2c.rsi
    layers:
    - state: m2c_gun_mount
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/HMGs/m2c.rsi
    slots:
    - suitStorage
    - Back
  - type: AmmoCounter
  - type: StaticPrice
    price: 1000
  - type: MagazineAmmoProvider
    autoEject: true
  - type: RMCAmmoEject
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 20
  - type: Gun
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot: null # GunSpinup loopSound is the shot sound
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: GunSpinup
    baseShotDelay: 0.5
    baseScatter: 24
    initialWindupDelay: 1.5
    spinUpTime: 5
    graceAfterStop: 1.5
    spinDownTime: 3
    minSpinLevel: 1
    maxSpinLevel: 6
    rateTiers: [ 1, 2, 2, 3, 3, 4 ]
  - type: Overheat
    maxHeat: 100
    heatPerShot: 1.5
    cooldownRate: 5
    emergencyCooldownDelay: 2
    damage:
      types:
        Heat: 60
  - type: Damageable
    damageContainer: Inorganic
  - type: JuggernautGun
  - type: RMCRepairable
    heal: 60
    skill: RMCSkillEngineer
    skillRequired: 1
    fuelUsed: 5
    weldDelayDamageStep: 20
  - type: Wieldable
  - type: GunRequiresWield
  - type: WieldDelay
    baseDelay: 2
  - type: WieldableSpeedModifiers
    base: 0.45
    light: 0.6
    medium: 0.65
    heavy: 0.7
  - type: RMCWeaponAccuracy
  - type: GunUserWhitelist
    whitelist:
      components:
      - JuggernautWhitelist
  - type: GunRequiresSkills
    skills:
      RMCSkillSpecialistWeapons: 1
  - type: GunRequireEquipped
    whitelist:
      components:
      - JuggernautArmor
  - type: RMCMagneticItem
  - type: Corrodible
    isCorrodible: false
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      cell_slot: !type:ContainerSlot { }
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_reload.ogg
        priority: 2
        whitelist:
          tags:
          - STMagazineM134C
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: RMCPowerCellSmartgun
        whitelist:
          components:
          - SmartGunBattery
  - type: GunDrainBatteryOnShoot
  - type: GunDamageModifier
    multiplier: 1
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/lmg_mouse.rsi
      state: all

# Belts
- type: entity
  parent: CMMagazineRifleBase
  id: STMagazineM134CAP
  name: M134C ammo belt (7.62mm AP)
  description: A 500-round armor-piercing belt for the M134C-JLCW minigun.
  components:
  - type: Tag
    tags:
    - STMagazineM134C
  - type: Item
    size: Large
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - STCartridgeM134CAP
    proto: STCartridgeM134CAP
    capacity: 500
    deleteWhenEmpty: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/HMGs/m2c.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-1
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    slots:
    - suitStorage

- type: entity
  parent: STMagazineM134CAP
  id: STMagazineM134CHE
  name: M134C ammo belt (7.62mm HE)
  description: A 400-round high-explosive belt for the M134C-JLCW minigun.
  components:
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - STCartridgeM134CHE
    proto: STCartridgeM134CHE
    capacity: 400
    deleteWhenEmpty: false

# Cartridges
- type: entity
  parent: CMBaseCartridgeRifle
  id: STCartridgeM134CAP
  name: cartridge (7.62mm AP)
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/large_casing.rsi
    layers:
    - state: base
      map: [ "enum.AmmoVisualLayers.Base" ]
  - type: CartridgeAmmo
    proto: STBulletM134CAP
  - type: Tag
    tags:
    - STCartridgeM134CAP

- type: entity
  parent: STCartridgeM134CAP
  id: STCartridgeM134CHE
  name: cartridge (7.62mm HE)
  components:
  - type: CartridgeAmmo
    proto: STBulletM134CHE
  - type: Tag
    tags:
    - STCartridgeM134CHE

# Projectiles
- type: entity
  parent: CMBulletBase
  id: STBulletM134CAP
  name: bullet (7.62mm AP)
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/bullet_projectiles.rsi
    layers:
    - state: bullet
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 30
  - type: CMArmorPiercing
    amount: 40
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 7
      falloff: 4
    - range: 14
      falloff: 9999
  - type: RMCProjectileAccuracy
    accuracy: 80
    thresholds:
    - range: 6
      falloff: 12

- type: entity
  parent: CMBulletBase
  id: STBulletM134CHE
  name: bullet (7.62mm HE)
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/bullet_projectiles.rsi
    layers:
    - state: bullet
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Blunt: 15
  - type: TriggerOnCollide
    fixtureID: projectile
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: RMC
    maxIntensity: 3
    intensitySlope: 3
    totalIntensity: 6
    maxTileBreak: 0
    canCreateVacuum: false
  - type: CMExplosionEffect
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 7
      falloff: 4
    - range: 12
      falloff: 9999
  - type: RMCProjectileAccuracy
    accuracy: 75
    thresholds:
    - range: 6
      falloff: 12

# Tags
- type: Tag
  id: STMagazineM134C

- type: Tag
  id: STCartridgeM134CAP

- type: Tag
  id: STCartridgeM134CHE
