- type: entity
  parent: RMCBaseBullet
  id: STBulletRX47Chaingun
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 40
  - type: CMArmorPiercing
    amount: 40
  - type: RMCProjectileAccuracy
    accuracy: 95
    thresholds:
    - range: 7
      falloff: 8

- type: entity
  parent: RMCProjectileRocket84mm
  id: STBulletRX47Siegebreaker
  name: 50mm siegebreaker shell
  # Reuses the RMC rocket projectile base for explosive behavior; the RX47 round remains balanced as 50mm data below.
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 22.5
        Structural: 45
    maxFixedRange: 6 # 7 tiles
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/m5spec_projectiles.rsi
    layers:
    - state: m5_84mm_he
  - type: Explosive
    explosionType: RMC
    maxIntensity: 20
    intensitySlope: 20
    totalIntensity: 50
    maxTileBreak: 0
  - type: CMArmorPiercing
    amount: 100

