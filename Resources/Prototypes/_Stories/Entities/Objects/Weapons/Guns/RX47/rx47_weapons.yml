      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 22
        Structural: 20
  - type: CMArmorPiercing
    amount: 10
  - type: ProjectileSpread
    proto: STPelletRX47Scattergun
    count: 7
    spread: 18
  - type: RMCProjectileDamageFalloff
