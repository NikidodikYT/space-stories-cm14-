- type: entity
  parent: RMCAttachmentMiniFlamethrower
  id: STRX47AttachmentMiniFlamethrower
  name: RX47 mini flamethrower
  description: An RX47-mounted refillable flamethrower attachment.
  components:
  - type: SolutionContainerManager
    solutions:
      rmc_flamer_tank:
        maxVol: 750
        reagents: []
  - type: RMCFlamerTank
    maxIntensity: 10
    maxDuration: 10
    reagentWhitelist:
    - RMCNapalmUT
    - WeldingFuel
  - type: CombatMechUnderbarrel
  - type: CombatMechWeaponFlamerTank
  - type: Gun
    # The parent attachment has no origin offset; RX47 fires it from the mech shoulder.
    shootOriginOffset: 0, -0.85
  - type: AttachableToggleable
    needHand: false
    userOnly: true
    attachedOnly: true
    supercedeHolder: true
    wieldedUseOnly: false
    activatePopupText: attachable-popup-switch-to-generic
    deactivatePopupText: attachable-popup-switch-from-generic
    activateSound:
      path: /Audio/_RMC14/Attachable/gun_u7_activate.ogg
      params:
        volume: -2
    actionName: Switch to the mini flamethrower.
    actionDesc: Switch to using the mini flamethrower.
    icon:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/under.rsi
      state: flamethrower
    iconActive:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/under.rsi
      state: flamethrower-on
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/flamer_mouse.rsi
      state: all
