- type: entity
  parent: BaseTreeConifer
  id: STFloraTreeChristmas
  suffix: MC Presents
  name: christmas tree
  components:
  - type: Sprite
    state: treechristmas02
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,0,0.5,0.75"
        density: 4500
        layer:
        - WallLayer
  - type: LimitedItemGiver
    spawnEntries:
      - id: STPresentRandom
        prob: 0.8
        orGroup: present
      - id: STPresentRandomCash # buy your own.
        prob: 0.05
        orGroup: present
      - id: PresentRandomCoal # naughty
        prob: 0.15
        orGroup: present
    receivedPopup: christmas-tree-got-gift
    deniedPopup: christmas-tree-no-gift
    requiredHoliday: FestiveSeason
