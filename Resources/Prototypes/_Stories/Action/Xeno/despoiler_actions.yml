- type: entity
  parent: ActionXenoBase
  id: STActionXenoDespoilerAcidBarrage
  name: Acid Barrage
  description: "Activate to arm — the icon lights up green. Hold LMB to charge the volley: the longer you hold, the more projectiles. Release LMB to fire at the cursor. Right-click cancels the ability."
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Stories/Interface/Actions/despoiler.rsi
      state: acid_barrage
    checkCanInteract: false
  - type: InstantAction
    event: !type:XenoDespoilerAcidBarrageActionEvent
  - type: XenoDespoilerAcidBarrageAction
    maxChargeSeconds: 3
    minProjectiles: 1
    maxProjectiles: 8
    empowerBonusProjectiles: 6
    scatterDegrees: 30
    chargingSpeedMultiplier: 0.5
    projectileId: STProjectileDespoilerAcidShot
    projectileSpeed: 12
    minRangeTiles: 1
    maxRangeTiles: 6
    minProjectileScale: 0.9
    maxProjectileScale: 1.33
    postFireCooldown: 12
    chargeSound:
      path: /Audio/_RMC14/Xeno/acid_sizzle1.ogg
    fireSound:
      path: /Audio/_RMC14/Xeno/alien_spitacid2.ogg
  - type: XenoActionPlasma
    cost: 100

- type: entity
  parent: ActionXenoBase
  id: STActionXenoDespoilerCausticEmbrace
  name: Caustic Embrace
  description: Leap toward the click with an acid splash. Empowered lets you strike a chosen target up to 5 tiles away and applies an acid DoT.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Stories/Interface/Actions/despoiler.rsi
      state: caustic_embrace
    checkCanInteract: false
    useDelay: 12
  - type: TargetAction
    range: 5
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:XenoDespoilerCausticEmbraceActionEvent
  - type: XenoDespoilerCausticEmbraceAction
    normalRange: 3
    empoweredRange: 5
    splashDamage:
      types:
        Heat: 30
    empoweredDamage:
      types:
        Heat: 30
    lingeringAcidChance: 0.3
    empoweredWeakenDuration: 1
    telegraphProto: STEffectDespoilerCausticTelegraph
    lingeringAcidProto: STEffectDespoilerLingeringAcid
    pounceSound:
      path: /Audio/_RMC14/Xeno/alien_roar1.ogg
  - type: XenoActionPlasma
    cost: 100

- type: entity
  parent: ActionXenoBase
  id: STActionXenoDespoilerOozingWounds
  name: Oozing Wounds
  description: Creates a ring of acid spray around you. The radius grows as your HP drops. The empowered version stuns and applies acid. Lose stacks upon use.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Stories/Interface/Actions/despoiler.rsi
      state: oozing_wounds
    checkCanInteract: false
    useDelay: 25
  - type: InstantAction
    event: !type:XenoDespoilerOozingWoundsActionEvent
  - type: XenoDespoilerOozingWoundsAction
    baseRadius: 1
    severityHpThreshold1: 0.7
    severityHpThreshold2: 0.3
    lingeringAcidChance: 0.2
    distanceDelayPerTile: 0.2
    telegraphProto: STEffectDespoilerOozingTelegraph
    acidSprayProto: STEffectDespoilerAcidSpray
    acidSprayEmpoweredProto: STEffectDespoilerAcidSprayEmpowered
    lingeringAcidProto: STEffectDespoilerLingeringAcid
    castSound:
      path: /Audio/_RMC14/Xeno/acid_sizzle3.ogg
  - type: XenoActionPlasma
    cost: 100

- type: entity
  parent: ActionXenoBase
  id: STActionXenoDespoilerCatalyze
  name: Catalyze
  description: Spends 2 Hypertension stacks and empowers your next active ability.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Stories/Interface/Actions/despoiler.rsi
      state: catalyze
    checkCanInteract: false
    useDelay: 20
  - type: InstantAction
    event: !type:XenoDespoilerCatalyzeActionEvent
  - type: XenoDespoilerCatalyzeAction
    hypertensionCost: 2
    buffDuration: 10
    visualProto: STEffectDespoilerCatalyze
